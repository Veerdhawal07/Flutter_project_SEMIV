name: main_project
description: "Smart Village Manager - Digital Governance and Local Commerce App."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.2
  firebase_messaging: ^15.2.10
  flutter_riverpod: ^2.6.1
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.5
  fl_chart: ^0.70.2
  flutter_spinkit: ^5.2.1
  font_awesome_flutter: ^10.8.0
  url_launcher: ^6.3.1
  http: ^1.2.2
  path_provider: ^2.1.5
  path: ^1.9.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
